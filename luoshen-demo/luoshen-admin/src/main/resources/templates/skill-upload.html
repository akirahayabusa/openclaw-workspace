<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能包上传 - 洛神管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 4px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #409eff;
            background: #f0f7ff;
        }

        .upload-area.drag-over {
            border-color: #409eff;
            background: #e6f1fc;
        }

        .upload-icon {
            font-size: 48px;
            color: #409eff;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 14px;
        }

        .file-info {
            margin-top: 15px;
            padding: 10px;
            background: #f0f7ff;
            border-radius: 4px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #409eff;
            color: white;
        }

        .btn-primary:hover {
            background: #66b1ff;
        }

        .btn-secondary {
            background: #fff;
            color: #606266;
            border: 1px solid #dcdfe6;
        }

        .btn-secondary:hover {
            color: #409eff;
            border-color: #c6e2ff;
            background: #ecf5ff;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .message {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #f0f9ff;
            border: 1px solid #b3d8ff;
            color: #409eff;
        }

        .message.error {
            background: #fef0f0;
            border: 1px solid #fbc4c4;
            color: #f56c6c;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
            display: none;
        }

        .progress-bar.show {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: #409eff;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📦 技能包上传</h1>

    <div id="message" class="message"></div>

    <form id="uploadForm">
        <div class="form-group">
            <label>技能包文件（.skill 或 .zip）</label>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div>拖拽文件到此处 或 点击上传</div>
                <div class="upload-hint">支持 .skill, .zip 格式，最大 50MB</div>
            </div>
            <input type="file" id="fileInput" accept=".skill,.zip" style="display: none;">
            <div class="file-info" id="fileInfo"></div>
        </div>

        <div class="form-group">
            <label for="skillId">技能 ID（可选，留空自动生成）</label>
            <input type="text" id="skillId" name="skillId" placeholder="例如：github-integration">
        </div>

        <div class="form-group">
            <label for="name">技能名称（可选，从 SKILL.md 提取）</label>
            <input type="text" id="name" name="name" placeholder="例如：GitHub 集成">
        </div>

        <div class="form-group">
            <label for="description">技能描述（可选）</label>
            <textarea id="description" name="description" placeholder="描述这个技能的功能..."></textarea>
        </div>

        <div class="form-group">
            <label for="category">主分类（可选）</label>
            <select id="category" name="category">
                <option value="">-- 不选择 --</option>
                <option value="dev">开发</option>
                <option value="ops">运维</option>
                <option value="data">数据</option>
                <option value="integration">集成</option>
            </select>
        </div>

        <div class="form-group">
            <label for="subCategory">子分类（可选）</label>
            <input type="text" id="subCategory" name="subCategory" placeholder="例如：git, cicd, analysis">
        </div>

        <div class="form-group">
            <label for="tags">标签（可选，JSON 数组）</label>
            <input type="text" id="tags" name="tags" placeholder='例如：["github", "git", "api"]'>
        </div>

        <div class="form-group">
            <label for="customType">自定义类型（可选）</label>
            <input type="text" id="customType" name="customType" placeholder="如果不满足预定义分类，可以自定义">
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-primary">上传技能包</button>
            <button type="reset" class="btn btn-secondary">重置</button>
        </div>
    </form>
</div>

<script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const uploadForm = document.getElementById('uploadForm');
    const messageDiv = document.getElementById('message');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');

    let selectedFile = null;

    // 点击上传区域
    uploadArea.addEventListener('click', () => {
        fileInput.click();
    });

    // 文件选择
    fileInput.addEventListener('change', (e) => {
        handleFile(e.target.files[0]);
    });

    // 拖拽上传
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('drag-over');
    });

    uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('drag-over');
    });

    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        handleFile(file);
    });

    function handleFile(file) {
        if (!file) return;

        // 验证文件扩展名
        const validExtensions = ['.skill', '.zip'];
        const fileName = file.name.toLowerCase();
        const isValid = validExtensions.some(ext => fileName.endsWith(ext));

        if (!isValid) {
            showMessage('只支持 .skill 或 .zip 格式的文件', 'error');
            return;
        }

        // 验证文件大小（50MB）
        const maxSize = 50 * 1024 * 1024;
        if (file.size > maxSize) {
            showMessage('文件大小超过 50MB 限制', 'error');
            return;
        }

        selectedFile = file;
        fileInfo.innerHTML = `
            <strong>已选择文件：</strong>${file.name}<br>
            <strong>大小：</strong>${(file.size / 1024 / 1024).toFixed(2)} MB<br>
            <strong>类型：</strong>${file.type || '未知'}
        `;
        fileInfo.classList.add('show');
    }

    function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = `message show ${type}`;
        setTimeout(() => {
            messageDiv.classList.remove('show');
        }, 5000);
    }

    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!selectedFile) {
            showMessage('请先选择文件', 'error');
            return;
        }

        const formData = new FormData();
        formData.append('file', selectedFile);

        // 添加可选字段
        const skillId = document.getElementById('skillId').value;
        const name = document.getElementById('name').value;
        const description = document.getElementById('description').value;
        const category = document.getElementById('category').value;
        const subCategory = document.getElementById('subCategory').value;
        const tags = document.getElementById('tags').value;
        const customType = document.getElementById('customType').value;

        if (skillId) formData.append('skillId', skillId);
        if (name) formData.append('name', name);
        if (description) formData.append('description', description);
        if (category) formData.append('category', category);
        if (subCategory) formData.append('subCategory', subCategory);
        if (tags) formData.append('tags', tags);
        if (customType) formData.append('customType', customType);

        try {
            progressBar.classList.add('show');
            progressFill.style.width = '0%';

            const response = await fetch('/api/admin/skills/upload', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                progressFill.style.width = '100%';
                showMessage('技能包上传成功！', 'success');
                setTimeout(() => {
                    uploadForm.reset();
                    fileInfo.classList.remove('show');
                    selectedFile = null;
                    progressBar.classList.remove('show');
                }, 2000);
            } else {
                showMessage('上传失败：' + data.message, 'error');
            }

        } catch (error) {
            console.error('上传失败:', error);
            showMessage('上传失败：' + error.message, 'error');
        }
    });
</script>
</body>
</html>
