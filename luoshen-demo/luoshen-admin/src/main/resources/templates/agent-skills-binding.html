<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 技能绑定 - 洛神管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .agent-selector {
            margin-bottom: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 4px;
        }

        .agent-selector label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        .agent-selector select {
            width: 100%;
            max-width: 400px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }

        .binding-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .skill-list {
            border: 1px solid #ddd;
            border-radius: 4px;
            max-height: 400px;
            overflow-y: auto;
        }

        .skill-list-header {
            padding: 10px 15px;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            font-weight: 500;
            color: #606266;
        }

        .skill-item {
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }

        .skill-item:hover {
            background: #f0f7ff;
        }

        .skill-item:last-child {
            border-bottom: none;
        }

        .skill-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .skill-item.selected {
            background: #e6f1fc;
        }

        .skill-name {
            font-weight: 500;
            color: #333;
        }

        .skill-meta {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #409eff;
            color: white;
        }

        .btn-primary:hover {
            background: #66b1ff;
        }

        .btn-secondary {
            background: #fff;
            color: #606266;
            border: 1px solid #dcdfe6;
        }

        .btn-secondary:hover {
            color: #409eff;
            border-color: #c6e2ff;
            background: #ecf5ff;
        }

        .btn-danger {
            background: #f56c6c;
            color: white;
        }

        .btn-danger:hover {
            background: #f78989;
        }

        .bound-skills {
            margin-top: 20px;
        }

        .bound-skills-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .bound-skills-header h3 {
            font-size: 16px;
            color: #333;
        }

        .btn-small {
            padding: 4px 8px;
            font-size: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f5f5f5;
            font-weight: 500;
            color: #606266;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 4px;
        }

        .tag-info {
            background: #f4f4f5;
            color: #909399;
        }

        .tag-success {
            background: #f0f9ff;
            color: #409eff;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #909399;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #909399;
        }

        .message {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #f0f9ff;
            border: 1px solid #b3d8ff;
            color: #409eff;
        }

        .message.error {
            background: #fef0f0;
            border: 1px solid #fbc4c4;
            color: #f56c6c;
        }

        @media (max-width: 768px) {
            .binding-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎯 Agent 技能绑定</h1>

    <div id="message" class="message"></div>

    <!-- Agent 选择器 -->
    <div class="agent-selector">
        <label for="agentSelect">选择 Agent：</label>
        <select id="agentSelect">
            <option value="">-- 请选择 Agent --</option>
        </select>
    </div>

    <!-- 绑定区域 -->
    <div class="binding-section" id="bindingSection" style="display: none;">
        <!-- 左侧：可用技能 -->
        <div>
            <h3>可用技能</h3>
            <div class="skill-list">
                <div class="skill-list-header">双击或拖拽以绑定</div>
                <div id="availableSkills">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>

        <!-- 右侧：已绑定技能 -->
        <div>
            <h3>已绑定技能</h3>
            <div class="skill-list">
                <div class="skill-list-header">双击或拖拽以解绑</div>
                <div id="boundSkills">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 已绑定技能列表（表格） -->
    <div class="bound-skills" id="boundSkillsTable" style="display: none;">
        <div class="bound-skills-header">
            <h3>已绑定技能列表</h3>
            <button class="btn btn-secondary btn-small" onclick="loadBoundSkills()">刷新</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>技能名称</th>
                    <th>技能 ID</th>
                    <th>绑定模式</th>
                    <th>优先级</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="boundSkillsTableBody">
            </tbody>
        </table>
    </div>

    <!-- 操作按钮 -->
    <div class="actions">
        <button class="btn btn-primary" onclick="saveBindings()">保存配置</button>
        <button class="btn btn-secondary" onclick="loadAgents()">刷新 Agent</button>
        <button class="btn btn-secondary" onclick="window.location.href='/skills'">返回技能列表</button>
    </div>
</div>

<script>
    let currentAgentId = null;
    let availableSkills = [];
    let boundSkills = [];
    let allSkills = [];

    // 页面加载时初始化
    document.addEventListener('DOMContentLoaded', () => {
        loadAgents();
    });

    // 加载 Agent 列表
    async function loadAgents() {
        try {
            const response = await fetch('/api/admin/agents');
            const agents = await response.json();

            const select = document.getElementById('agentSelect');
            select.innerHTML = '<option value="">-- 请选择 Agent --</option>';
            agents.forEach(agent => {
                const option = document.createElement('option');
                option.value = agent.agentId;
                option.textContent = `${agent.name} (${agent.agentId})`;
                select.appendChild(option);
            });

        } catch (error) {
            console.error('加载 Agent 列表失败:', error);
            showMessage('加载 Agent 列表失败', 'error');
        }
    }

    // Agent 选择变化事件
    document.getElementById('agentSelect').addEventListener('change', (e) => {
        currentAgentId = e.target.value;
        if (currentAgentId) {
            loadSkills();
        } else {
            document.getElementById('bindingSection').style.display = 'none';
            document.getElementById('boundSkillsTable').style.display = 'none';
        }
    });

    // 加载技能
    async function loadSkills() {
        if (!currentAgentId) return;

        // 显示绑定区域
        document.getElementById('bindingSection').style.display = 'grid';
        document.getElementById('boundSkillsTable').style.display = 'block';

        // 加载已绑定技能
        await loadBoundSkills();

        // 加载所有可用技能
        await loadAllSkills();
    }

    // 加载所有技能
    async function loadAllSkills() {
        const container = document.getElementById('availableSkills');
        container.innerHTML = '<div class="loading">加载中...</div>';

        try {
            const response = await fetch('/api/admin/skills');
            const data = await response.json();

            allSkills = data.content || [];

            if (allSkills.length === 0) {
                container.innerHTML = '<div class="empty">暂无可用技能</div>';
                return;
            }

            renderAvailableSkills(allSkills);

        } catch (error) {
            console.error('加载技能列表失败:', error);
            container.innerHTML = '<div class="empty">加载失败</div>';
        }
    }

    // 渲染可用技能列表
    function renderAvailableSkills(skills) {
        const container = document.getElementById('availableSkills');
        const boundSkillIds = boundSkills.map(s => s.skillId);

        let html = '';
        skills.forEach(skill => {
            const isBound = boundSkillIds.includes(skill.skillId);
            html += `
                <div class="skill-item ${isBound ? 'disabled' : ''}" 
                     data-skill-id="${skill.skillId}"
                     onclick="handleSkillClick('${skill.skillId}')"
                     ondblclick="toggleSkill('${skill.skillId}')">
                    <div class="skill-name">${escapeHtml(skill.name)}</div>
                    <div class="skill-meta">
                        <span class="tag ${skill.source === 'builtin' ? 'tag-info' : 'tag-success'}">${skill.source === 'builtin' ? '内置' : '用户'}</span>
                        ${skill.category ? `<span class="tag tag-info">${escapeHtml(skill.category)}</span>` : ''}
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    // 加载已绑定技能
    async function loadBoundSkills() {
        const tableBody = document.getElementById('boundSkillsTableBody');
        const container = document.getElementById('boundSkills');
        container.innerHTML = '<div class="loading">加载中...</div>';

        try {
            const response = await fetch(`/api/admin/agents/${currentAgentId}/skills`);
            const skills = await response.json();

            boundSkills = skills;
            renderBoundSkillsTable(skills);
            renderAvailableSkills(allSkills);

        } catch (error) {
            console.error('加载已绑定技能失败:', error);
            container.innerHTML = '<div class="empty">加载失败</div>';
            tableBody.innerHTML = '';
        }
    }

    // 渲染已绑定技能表格
    function renderBoundSkillsTable(skills) {
        const tableBody = document.getElementById('boundSkillsTableBody');

        if (skills.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="6" class="empty">未绑定任何技能</td></tr>';
            return;
        }

        let html = '';
        skills.forEach(skill => {
            html += `
                <tr>
                    <td><strong>${escapeHtml(skill.name)}</strong></td>
                    <td><code>${escapeHtml(skill.skillId)}</code></td>
                    <td>${skill.bindMode}</td>
                    <td>${skill.priority}</td>
                    <td>${skill.enabled ? '✓ 启用' : '✗ 禁用'}</td>
                    <td>
                        <button class="btn btn-secondary btn-small" onclick="unbindSkill('${skill.skillId}')">解绑</button>
                    </td>
                </tr>
            `;
        });

        tableBody.innerHTML = html;
    }

    // 点击技能项
    function handleSkillClick(skillId) {
        // 实现单个技能的选中状态切换
        const item = document.querySelector(`[data-skill-id="${skillId}"]`);
        if (item && !item.classList.contains('disabled')) {
            item.classList.toggle('selected');
        }
    }

    // 绑定/解绑技能
    async function toggleSkill(skillId) {
        const isBound = boundSkills.some(s => s.skillId === skillId);

        if (isBound) {
            await unbindSkill(skillId);
        } else {
            await bindSkill(skillId);
        }
    }

    // 绑定技能
    async function bindSkill(skillId) {
        try {
            showMessage('正在绑定技能...', 'info');

            const response = await fetch(`/api/admin/agents/${currentAgentId}/skills/bind`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    skillId: skillId,
                    bindMode: 'custom',
                    priority: 0
                })
            });

            const data = await response.json();

            if (data.success) {
                showMessage('技能绑定成功', 'success');
                await loadBoundSkills();
            } else {
                showMessage('绑定失败：' + data.message, 'error');
            }

        } catch (error) {
            console.error('绑定技能失败:', error);
            showMessage('绑定失败：' + error.message, 'error');
        }
    }

    // 解绑技能
    async function unbindSkill(skillId) {
        if (!confirm('确定要解绑这个技能吗？')) {
            return;
        }

        try {
            const response = await fetch(`/api/admin/agents/${currentAgentId}/skills/${skillId}`, {
                method: 'DELETE'
            });

            const data = await response.json();

            if (data.success) {
                showMessage('技能解绑成功', 'success');
                await loadBoundSkills();
            } else {
                showMessage('解绑失败：' + data.message, 'error');
            }

        } catch (error) {
            console.error('解绑技能失败:', error);
            showMessage('解绑失败：' + error.message, 'error');
        }
    }

    // 保存配置
    async function saveBindings() {
        if (!currentAgentId) {
            showMessage('请先选择 Agent', 'error');
            return;
        }

        try {
            showMessage('正在保存配置...', 'info');

            const skillIds = boundSkills.map(s => s.skillId);
            
            const response = await fetch(`/api/admin/agents/${currentAgentId}/skills/config`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    mode: 'custom',
                    allowed: skillIds,
                    denied: []
                })
            });

            const data = await response.json();

            if (data.success) {
                showMessage('配置保存成功', 'success');
            } else {
                showMessage('保存失败：' + data.message, 'error');
            }

        } catch (error) {
            console.error('保存配置失败:', error);
            showMessage('保存失败：' + error.message, 'error');
        }
    }

    // 显示消息
    function showMessage(text, type) {
        const messageDiv = document.getElementById('message');
        messageDiv.textContent = text;
        messageDiv.className = `message show ${type}`;
        setTimeout(() => {
            messageDiv.classList.remove('show');
        }, 5000);
    }

    // HTML 转义
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Enter 键快捷键（批量选择）
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.ctrlKey) {
            e.preventDefault();
            saveBindings();
        }
    });
</script>
</body>
</html>
