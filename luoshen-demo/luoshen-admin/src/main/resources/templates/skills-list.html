<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能管理 - 洛神管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .search-box {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input[type="text"], select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        input[type="text"] {
            flex: 1;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #409eff;
            color: white;
        }

        .btn-primary:hover {
            background: #66b1ff;
        }

        .btn-secondary {
            background: #fff;
            color: #606266;
            border: 1px solid #dcdfe6;
        }

        .btn-secondary:hover {
            color: #409eff;
            border-color: #c6e2ff;
            background: #ecf5ff;
        }

        .btn-danger {
            background: #f56c6c;
            color: white;
        }

        .btn-danger:hover {
            background: #f78989;
        }

        .btn-small {
            padding: 4px 8px;
            font-size: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f5f5f5;
            font-weight: 500;
            color: #606266;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 4px;
            margin-bottom: 4px;
        }

        .tag-success {
            background: #f0f9ff;
            color: #409eff;
        }

        .tag-warning {
            background: #fdf6ec;
            color: #e6a23c;
        }

        .tag-info {
            background: #f4f4f5;
            color: #909399;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            gap: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #909399;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #909399;
        }

        .actions {
            display: flex;
            gap: 5px;
        }

        .status-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-enabled {
            background: #67c23a;
        }

        .status-disabled {
            background: #909399;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 技能管理</h1>

    <div class="toolbar">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索技能名称或ID...">
            <select id="categoryFilter">
                <option value="">所有分类</option>
            </select>
            <select id="sourceFilter">
                <option value="">所有来源</option>
                <option value="builtin">内置</option>
                <option value="user_upload">用户</option>
                <option value="marketplace">市场</option>
            </select>
            <select id="enabledFilter">
                <option value="">所有状态</option>
                <option value="true">已启用</option>
                <option value="false">已禁用</option>
            </select>
            <button class="btn btn-primary" onclick="loadSkills()">搜索</button>
        </div>
        <div>
            <a href="/skills/upload" class="btn btn-primary">+ 上传技能包</a>
        </div>
    </div>

    <div id="loading" class="loading">加载中...</div>

    <div id="skillsTable"></div>

    <div id="pagination" class="pagination"></div>
</div>

<script>
    let currentPage = 0;
    let pageSize = 20;
    let totalElements = 0;

    // 页面加载时初始化
    document.addEventListener('DOMContentLoaded', () => {
        loadCategories();
        loadSkills();
    });

    // 加载分类列表
    async function loadCategories() {
        try {
            const response = await fetch('/api/admin/skills/categories');
            const categories = await response.json();

            const select = document.getElementById('categoryFilter');
            select.innerHTML = '<option value="">所有分类</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });
        } catch (error) {
            console.error('加载分类失败:', error);
        }
    }

    // 加载技能列表
    async function loadSkills(page = 0) {
        currentPage = page;

        const searchInput = document.getElementById('searchInput').value;
        const category = document.getElementById('categoryFilter').value;
        const source = document.getElementById('sourceFilter').value;
        const enabled = document.getElementById('enabledFilter').value;

        showLoading(true);

        try {
            let url = `/api/admin/skills?page=${page}&size=${pageSize}`;
            if (category) url += `&category=${category}`;
            if (source) url += `&source=${source}`;
            if (enabled) url += `&enabled=${enabled}`;

            const response = await fetch(url);
            const data = await response.json();

            totalElements = data.totalElements;
            renderSkillsTable(data.content);
            renderPagination();

        } catch (error) {
            console.error('加载技能列表失败:', error);
            showError('加载失败');
        } finally {
            showLoading(false);
        }
    }

    // 渲染技能表格
    function renderSkillsTable(skills) {
        const tableDiv = document.getElementById('skillsTable');

        if (skills.length === 0) {
            tableDiv.innerHTML = '<div class="empty">暂无技能</div>';
            return;
        }

        let html = `
            <table>
                <thead>
                    <tr>
                        <th>技能名称</th>
                        <th>技能 ID</th>
                        <th>分类</th>
                        <th>来源</th>
                        <th>风险</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
        `;

        skills.forEach(skill => {
            const statusBadge = skill.enabled 
                ? '<span class="status-badge status-enabled"></span>已启用' 
                : '<span class="status-badge status-disabled"></span>已禁用';

            const sourceTag = skill.source === 'builtin' 
                ? '<span class="tag tag-info">内置</span>' 
                : '<span class="tag tag-success">用户</span>';

            const riskTag = skill.riskLevel === 'low' 
                ? '<span class="tag tag-success">低</span>' 
                : skill.riskLevel === 'medium' 
                    ? '<span class="tag tag-warning">中</span>' 
                    : '<span class="tag tag-danger">高</span>';

            html += `
                <tr>
                    <td><strong>${escapeHtml(skill.name)}</strong></td>
                    <td><code>${escapeHtml(skill.skillId)}</code></td>
                    <td>${skill.category || '-'}</td>
                    <td>${sourceTag}</td>
                    <td>${riskTag}</td>
                    <td>${statusBadge}</td>
                    <td>
                        <div class="actions">
                            <button class="btn btn-secondary btn-small" onclick="viewSkill('${skill.skillId}')">查看</button>
                            <button class="btn btn-secondary btn-small" onclick="toggleSkill('${skill.skillId}')">
                                ${skill.enabled ? '禁用' : '启用'}
                            </button>
                            <button class="btn btn-danger btn-small" onclick="deleteSkill('${skill.skillId}')">删除</button>
                        </div>
                    </td>
                </tr>
            `;
        });

        html += '</tbody></table>';
        tableDiv.innerHTML = html;
    }

    // 渲染分页
    function renderPagination() {
        const paginationDiv = document.getElementById('pagination');
        const totalPages = Math.ceil(totalElements / pageSize);

        if (totalPages <= 1) {
            paginationDiv.innerHTML = '';
            return;
        }

        let html = `
            <button class="btn btn-secondary" onclick="loadSkills(0)" ${currentPage === 0 ? 'disabled' : ''}>首页</button>
            <button class="btn btn-secondary" onclick="loadSkills(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>上一页</button>
            <span>第 ${currentPage + 1} / ${totalPages} 页</span>
            <button class="btn btn-secondary" onclick="loadSkills(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>下一页</button>
            <button class="btn btn-secondary" onclick="loadSkills(${totalPages - 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>末页</button>
        `;

        paginationDiv.innerHTML = html;
    }

    // 查看技能详情
    async function viewSkill(skillId) {
        try {
            const response = await fetch(`/api/admin/skills/${skillId}`);
            const skill = await response.json();

            alert(`技能详情：\n\n名称：${skill.name}\nID：${skill.skillId}\n描述：${skill.description}`);
        } catch (error) {
            console.error('获取技能详情失败:', error);
            alert('获取失败');
        }
    }

    // 切换技能状态
    async function toggleSkill(skillId) {
        try {
            const response = await fetch(`/api/admin/skills/${skillId}/toggle`, {
                method: 'POST'
            });
            const data = await response.json();

            if (data.success) {
                alert(data.message);
                loadSkills(currentPage);
            } else {
                alert('操作失败：' + data.message);
            }
        } catch (error) {
            console.error('切换状态失败:', error);
            alert('操作失败');
        }
    }

    // 删除技能
    async function deleteSkill(skillId) {
        if (!confirm('确定要删除这个技能吗？')) {
            return;
        }

        try {
            const response = await fetch(`/api/admin/skills/${skillId}`, {
                method: 'DELETE'
            });
            const data = await response.json();

            if (data.success) {
                alert('删除成功');
                loadSkills(currentPage);
            } else {
                alert('删除失败：' + data.message);
            }
        } catch (error) {
            console.error('删除失败:', error);
            alert('删除失败');
        }
    }

    // 显示/隐藏加载状态
    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'block' : 'none';
    }

    // 显示错误
    function showError(message) {
        const tableDiv = document.getElementById('skillsTable');
        tableDiv.innerHTML = `<div class="empty">${message}</div>`;
    }

    // HTML 转义
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 搜索框回车事件
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            loadSkills(0);
        }
    });

    // 筛选器变化事件
    document.getElementById('categoryFilter').addEventListener('change', () => loadSkills(0));
    document.getElementById('sourceFilter').addEventListener('change', () => loadSkills(0));
    document.getElementById('enabledFilter').addEventListener('change', () => loadSkills(0));
</script>
</body>
</html>
