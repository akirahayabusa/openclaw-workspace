# Luoshen Demo 配置
server:
  port: 8080

luoshen:
  # 请设置你的 DashScope API Key，也可以通过环境变量 DASHSCOPE_API_KEY 设置
  api-key: ${DASHSCOPE_API_KEY:}
  model-name: qwen-max
  session-path: ${user.home}/.luoshen/sessions

spring:
  application:
    name: luoshen-demo

# 日志配置
logging:
  level:
    io.agentscope: INFO
    com.auo.luoshen: DEBUG
